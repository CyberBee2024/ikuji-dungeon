<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#e8eef4;display:flex;justify-content:center;align-items:flex-start;overflow:hidden;touch-action:none;}
#app{position:relative;width:400px;display:flex;flex-direction:column;background:#fff;}
#hud{flex-shrink:0;background:#fff;border-bottom:2px solid #b0c4d8;padding:4px 10px;display:flex;align-items:center;gap:8px;height:26px;}
#hud-label{color:#1a3a5c;font-family:monospace;font-size:11px;white-space:nowrap;}
#mp-bar-outer{flex:1;height:12px;background:#d0dde8;border:1.5px solid #7a9ab8;border-radius:2px;overflow:hidden;}
#mp-bar-inner{height:100%;background:#4caf50;width:100%;}
#hud-val{color:#1a3a5c;font-family:monospace;font-size:11px;min-width:52px;text-align:right;}
#game-area{flex-shrink:0;position:relative;overflow:hidden;background:#f0f4f8;}
#game-canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#sparkle-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:10;image-rendering:pixelated;}
#msg-window{flex-shrink:0;background:#000;border-top:3px solid #000;padding:5px 8px;height:100px;}
#msg-inner{border:2px solid #fff;width:100%;height:100%;padding:5px 7px;color:#fff;font-family:monospace;font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-all;background:#000;}
#msg-cursor{display:none;width:8px;height:11px;background:#fff;vertical-align:text-bottom;margin-left:2px;animation:blink .6s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#dpad-area{flex-shrink:0;display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:46px 46px;gap:3px;padding:6px;justify-content:center;background:#e8eef4;border-top:2px solid #b0c4d8;height:106px;}
.dbtn{background:#fff;border:2px solid #7a9ab8;color:#1a3a5c;font-size:20px;cursor:pointer;border-radius:5px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;}
.dbtn:active{background:#d0dde8;}
#btn-a{background:#e8f4e8;border-color:#4caf50;color:#1a6a1a;font-size:11px;font-weight:700;font-family:monospace;}
.dbtn-empty{border:none;background:transparent;pointer-events:none;}
#flash{position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;opacity:0;pointer-events:none;z-index:20;transition:opacity 0.15s;}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px;font-family:monospace;color:#1a3a5c;text-align:center;}
#overlay h1{font-size:18px;color:#1a3a5c;margin-bottom:10px;line-height:1.5;border:2px solid #1a3a5c;padding:8px 16px;}
#overlay .sub{font-size:11px;color:#3a6080;line-height:1.8;margin-bottom:18px;}
.ov-btn{background:#fff;border:2px solid #1a3a5c;color:#1a3a5c;font-family:monospace;font-size:13px;font-weight:700;padding:10px 20px;cursor:pointer;margin:4px;width:100%;max-width:260px;display:block;}
.ov-btn:hover,.ov-btn:active{background:#e8eef4;}
.like-note{color:#1a3a5c;font-size:12px;font-family:monospace;margin-top:10px;line-height:1.6;border:1px solid #1a3a5c;padding:8px 12px;max-width:260px;width:100%;}
</style>
</head>

}

function r(c,x,y,w,h){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

function drawTile(tx,ty,tid){
  var sx=tx*TILE,sy=ty*TILE,S=TILE;
  switch(tid){
    case T.WALL:
      r("#2a2010",sx,sy,S,S);r("#4a3820",sx,sy,S,5);r("#201808",sx,sy+5,S,S-5);
      r("#3a2818",sx,sy,1,S);r("#3a2818",sx+S-1,sy,1,S);break;
    case T.FLOOR:
      r((tx+ty)%2===0?"#c8b078":"#b89c66",sx,sy,S,S);
      r("#d8c088",sx,sy,S,1);r("#d8c088",sx,sy,1,S);
      r("#a08040",sx,sy+S-1,S,1);r("#a08040",sx+S-1,sy,1,S);break;
    case T.OUTSIDE:
      r((tx+ty)%2===0?"#507840":"#608850",sx,sy,S,S);break;
    case T.GATE:
      r("#1a1a2e",sx,sy,S,S);r("#334466",sx+2,sy+2,S-4,S-4);
      r("#ffdd00",sx+4,sy+8,S-8,3);r("#00ffff",sx+S/2-1,sy+3,2,5);
      ctx.fillStyle="#ffff88";ctx.font="bold 7px monospace";ctx.textAlign="center";
      ctx.fillText("改札",sx+S/2,sy+S-3);break;
    case T.STAIR:
      r("#9a7a50",sx,sy,S,S);
      for(var i=0;i<4;i++){r("#7a5a30",sx,sy+i*6,S,3);}
      ctx.fillStyle="#cc4444";ctx.font="bold 9px monospace";ctx.textAlign="center";
      ctx.fillText("×",sx+S/2,sy+S-3);break;
    case T.ELEV:
      r("#5555aa",sx,sy,S,S);r("#8888cc",sx+3,sy+3,S-6,S-6);
      ctx.fillStyle="#ffff88";ctx.font="bold 9px monospace";ctx.textAlign="center";
      ctx.fillText("E",sx+S/2,sy+S/2+4);break;
    case T.ELEVDOOR:
      r("#7777bb",sx,sy,S,S);
      r("#aaaaee",sx+3,sy+2,S/2-4,S-4);r("#aaaaee",sx+S/2+1,sy+2,S/2-4,S-4);
      ctx.fillStyle="#ffff88";ctx.font="bold 8px monospace";ctx.textAlign="center";
      ctx.fillText("E",sx+S/2,sy+S-3);break;
    case T.PLATFORM:
      r((tx+ty)%2===0?"#888090":"#787080",sx,sy,S,S);
      r("#ffff00",sx,sy+S-3,S,3);break;
    case T.TRAINDOOR:
      // 8bit風 電車ドア — 青い車体にシンプルな引き戸
      r("#1a55bb",sx,sy,S,S);          // 車体色
      r("#0a3388",sx,sy,S,3);          // 上部影
      r("#2266cc",sx,sy+3,S,2);        // ハイライト帯
      // 左ドア
      r("#cce8ff",sx+2,sy+5,S/2-4,S-8); // ガラス
      r("#aaccee",sx+2,sy+5,S/2-4,2);   // ガラス上枠反射
      r("#7799bb",sx+2,sy+5,2,S-8);     // 左枠
      r("#7799bb",sx+S/2-3,sy+5,2,S-8); // 右枠
      // 右ドア
      r("#cce8ff",sx+S/2+2,sy+5,S/2-4,S-8);
      r("#aaccee",sx+S/2+2,sy+5,S/2-4,2);
      r("#7799bb",sx+S/2+2,sy+5,2,S-8);
      r("#7799bb",sx+S-4,sy+5,2,S-8);
      // ドア中央の隙間
      r("#0a3388",sx+S/2-1,sy+5,2,S-8);
      // 下部ステップ
      r("#334477",sx,sy+S-3,S,3);
      break;
    case T.RAIL:
      // 8bit風 電車の車体+線路
      r("#1a55bb",sx,sy,S,4);   // 車体上部
      r("#2266cc",sx,sy+4,S,2); // 車体ライン
      r("#ddeeff",sx+2,sy+1,S-4,2); // 車体窓
      r("#334477",sx,sy+6,S,4); // 車体下部
      r("#555",sx,sy+10,S,4);   // 車輪部分
      r("#888",sx+2,sy+11,4,3); r("#888",sx+S-6,sy+11,4,3); // 車輪
      r("#333",sx,sy+14,S,S-14); // 線路エリア
      r("#666",sx,sy+16,S,3);   // レール横棒
      r("#888",sx+3,sy+14,3,S-14); r("#888",sx+S-6,sy+14,3,S-14); // レール縦
      break;
    case T.GOALFLOOR:
      r((tx+ty)%2===0?"#d4c040":"#c4b030",sx,sy,S,S);
      r("#e8d850",sx,sy,S,1);r("#e8d850",sx,sy,1,S);break;
    case T.PILLAR:
      r((tx+ty)%2===0?"#c8b078":"#b89c66",sx,sy,S,S);
      r("#8a7050",sx+5,sy+2,S-10,S-4);r("#6a5030",sx+7,sy+4,S-14,S-8);break;
    case T.BENCH:
      r((tx+ty)%2===0?"#c8b078":"#b89c66",sx,sy,S,S);
      r("#8b4513",sx+2,sy+10,S-4,5);
      r("#6b3010",sx+3,sy+8,4,7);r("#6b3010",sx+S-7,sy+8,4,7);break;
    case T.TWALL:
      // 車体の壁 — アイボリー系の内装
      r("#ddd8cc",sx,sy,S,S);
      // 上部の帯（路線カラー帯）
      r("#2255aa",sx,sy,S,4);
      r("#4488cc",sx,sy+4,S,2);
      // 壁の縦ラインで仕切り感
      r("#c8c4b8",sx,sy,1,S);
      r("#c8c4b8",sx+S-1,sy,1,S);
      break;
    case T.TWINDOW:
      // 車体ベース色
      r("#ddd8cc",sx,sy,S,S);
      // 上部帯
      r("#2255aa",sx,sy,S,4);
      r("#4488cc",sx,sy+4,S,2);
      // 窓枠（金属グレー）
      r("#999990",sx+2,sy+6,S-4,S-8);
      // 窓ガラス外側（ダークな外の景色）
      r("#1a2a3a",sx+3,sy+7,S-6,S-11);
      // 外の景色：夜のビル灯り風
      r("#223344",sx+3,sy+7,S-6,S-11);
      // 建物シルエット
      r("#111a22",sx+4,sy+10,4,S-14);
      r("#111a22",sx+10,sy+12,3,S-16);
      r("#111a22",sx+15,sy+9,3,S-13);
      // 遠くの明かり
      r("#ffff88",sx+5,sy+9,1,1);
      r("#ffcc44",sx+12,sy+11,1,1);
      r("#88ccff",sx+17,sy+8,1,1);
      // 窓の中央桟（二連窓の仕切り）
      r("#999990",sx+S/2-1,sy+7,2,S-11);
      // 開閉部の線（上の細いライン）
      r("#bbbbaa",sx+3,sy+7,S-6,1);
      // 窓下の棚（荷物棚のライン）
      r("#c8c4b8",sx,sy+S-2,S,2);
      break;
    case T.TSTRAP:
      // 車内天井〜つり革エリア
      r("#ddd8cc",sx,sy,S,S);
      // 上部帯
      r("#2255aa",sx,sy,S,4);
      r("#4488cc",sx,sy+4,S,2);
      // つり革ポール（天井から）
      r("#aaa8a0",sx+S/2-1,sy+6,2,5);
      // つり革リング
      ctx.strokeStyle="#888880";ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(sx+S/2,sy+13,3,0,Math.PI*2);ctx.stroke();
      // リング内側
      ctx.strokeStyle="#ccccbb";ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(sx+S/2,sy+13,1.5,0,Math.PI*2);ctx.stroke();
      break;
    case T.TFLOOR:
      // 車内床 — ダークグレーのゴム床
      r((tx+ty)%2===0?"#6a6860":"#5e5c56",sx,sy,S,S);
      // 床の目地線
      r("#50504a",sx,sy,S,1);
      r("#50504a",sx,sy,1,S);
      break;
    case T.TSEAT:
      // 座席 — 青いベンチシート
      r("#2244aa",sx,sy,S,S);
      r("#1a3388",sx,sy,S,4);
      r("#3355bb",sx,sy+4,S,4);
      r("#1a2266",sx,sy+8,S,S-8);
      r("#0a1144",sx,sy,2,S);r("#0a1144",sx+S-2,sy,2,S);
      break;
    case T.TPRIO:
      // 優先席 — 緑のシート
      r("#227744",sx,sy,S,S);
      r("#1a5533",sx,sy,S,4);
      r("#338855",sx,sy+4,S,4);
      r("#1a4422",sx,sy+8,S,S-8);
      r("#0a2211",sx,sy,2,S);r("#0a2211",sx+S-2,sy,2,S);
      ctx.fillStyle="#aaffcc";ctx.font="bold 7px monospace";ctx.textAlign="center";
      ctx.fillText("優",sx+S/2,sy+S-2);
      break;
      r("#111",sx,sy,S,S);
  }
}

// 電車乗客 — idから見た目を決定して多様なキャラを描く
function drawDeco(sx,sy,npcId){
  var S=TILE;
  // idの末尾数字でキャラ種別を決定
  var n=parseInt((npcId||"p1").replace(/\D/g,""))||1;
  var kind=n%6; // 0=スーツ男, 1=若い女性, 2=学生, 3=高齢者, 4=子供, 5=女性会社員
  var bodyColors=["#336699","#cc6688","#557722","#888870","#cc8833","#445588"];
  var hairColors=["#1a1a1a","#6a3a10","#1a1a1a","#ccccaa","#5a3010","#1a1a1a"];
  var skinColors=["#f0c880","#f5d0a0","#e8c078","#f0c880","#f8d8a8","#f0c880"];
  var bc=bodyColors[kind], hc=hairColors[kind], sc=skinColors[kind];
  // 体
  r(bc,sx+5,sy+11,S-10,9);
  // 頭
  ctx.fillStyle=sc;ctx.beginPath();ctx.arc(sx+S/2,sy+8,5,0,Math.PI*2);ctx.fill();
  // 髪
  if(kind===4){ // 子供は小さい
    r(hc,sx+7,sy+3,S-14,5);
  } else if(kind===1||kind===5){ // 女性は長髪
    r(hc,sx+6,sy+3,S-12,5);
    r(hc,sx+6,sy+8,3,6); r(hc,sx+S-9,sy+8,3,6);
  } else {
    r(hc,sx+7,sy+3,S-14,5);
  }
  // 目
  r("#333",sx+8,sy+7,2,2); r("#333",sx+S-10,sy+7,2,2);
  // マスク(kind 0,2,5)
  if(kind===0||kind===2||kind===5){
    r("#ddeeff",sx+7,sy+9,S-14,3);
  }
  // スマホ(kind 1,3)
  if(kind===1||kind===3){
    r("#222",sx+S-9,sy+12,4,5); r("#5599ff",sx+S-8,sy+13,2,3);
  }
}

// ===================================================================
// CAMERA
// ===================================================================
function getCam(){
  var map=curMap();
  var cx=G.px-Math.floor(VCOLS/2);
  var cy=G.py-Math.floor(VROWS/2);
  cx=Math.max(0,Math.min(map.w-VCOLS,cx));
  cy=Math.max(0,Math.min(map.h-VROWS,cy));
  return{cx:cx,cy:cy};
}

// ===================================================================
// RENDER
// ===================================================================
function render(){
  var map=curMap();
  var cam=getCam();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var ty=0;ty<VROWS;ty++){
    for(var tx=0;tx<VCOLS;tx++){
      var mx=tx+cam.cx,my=ty+cam.cy;
      if(mx<0||mx>=map.w||my<0||my>=map.h){r("#111",tx*TILE,ty*TILE,TILE,TILE);continue;}
      drawTile(tx,ty,map.data[my][mx]);
    }
  }
  var npcs=map.npcs||[];
  for(var i=0;i<npcs.length;i++){
    var npc=npcs[i];
    if(G.dead[npc.id]) continue;
    var tx2=npc.x-cam.cx,ty2=npc.y-cam.cy;
    if(tx2<0||tx2>=VCOLS||ty2<0||ty2>=VROWS) continue;
    var sx2=tx2*TILE,sy2=ty2*TILE;
    if(npc.type==="elevqueue_main"||npc.type==="elevqueue_sub") drawElevQueue(sx2,sy2);
    else if(npc.type==="mystery") drawMystery(sx2,sy2);
    else if(npc.type==="enemy") drawEnemy(sx2,sy2);
    else if(npc.type==="heal") drawHealer(sx2,sy2);
    else if(npc.type==="friend") drawFriend(sx2,sy2);
    else drawDeco(sx2,sy2,npc.id);
  }
  var px2=G.px-cam.cx,py2=G.py-cam.cy;
  if(px2>=0&&px2<VCOLS&&py2>=0&&py2<VROWS) drawPlayer(px2*TILE,py2*TILE);
  // マップ名表示(空でなければ)
  if(map.name){
    ctx.fillStyle="#1a3a5c";ctx.font="bold 10px monospace";ctx.textAlign="left";
    var nameW=ctx.measureText(map.name).width+12;
    ctx.fillStyle="rgba(255,255,255,0.82)";ctx.fillRect(0,0,nameW,16);
    ctx.fillStyle="#1a3a5c";ctx.font="bold 10px monospace";ctx.textAlign="left";
    ctx.fillText(map.name,4,11);
  }
}

// ===================================================================
// SPARKLE (ハート・星エフェクト)
// ===================================================================
var sparkles=[];
var SCOLS=["#ff88cc","#ffaaee","#ffdd44","#ff66aa","#aaffcc","#88eeff","#ffffff","#ffcc00"];

function drawSparkleParticle(s){
  sCtx.save();
  sCtx.globalAlpha=s.life;
  sCtx.fillStyle=s.color;
  sCtx.translate(s.x,s.y);
  sCtx.rotate(s.rot);
  if(s.shape==="heart"){
    var sc=s.size*0.4;
    sCtx.beginPath();
    sCtx.moveTo(0,sc*0.3);
    sCtx.bezierCurveTo(0,-sc*0.3,-sc,-sc*0.3,-sc,sc*0.1);
    sCtx.bezierCurveTo(-sc,sc*0.6,0,sc*0.9,0,sc);
    sCtx.bezierCurveTo(0,sc*0.9,sc,sc*0.6,sc,sc*0.1);
    sCtx.bezierCurveTo(sc,-sc*0.3,0,-sc*0.3,0,sc*0.3);
    sCtx.fill();
  } else if(s.shape==="star"){
    var sz=s.size;
    sCtx.beginPath();
    for(var k=0;k<5;k++){
      var a1=k*Math.PI*2/5-Math.PI/2;
      var a2=(k+0.5)*Math.PI*2/5-Math.PI/2;
      if(k===0) sCtx.moveTo(Math.cos(a1)*sz,Math.sin(a1)*sz);
      else sCtx.lineTo(Math.cos(a1)*sz,Math.sin(a1)*sz);
      sCtx.lineTo(Math.cos(a2)*sz*0.4,Math.sin(a2)*sz*0.4);
    }
    sCtx.closePath();sCtx.fill();
  } else {
    sCtx.fillRect(-s.size*0.25,-s.size,s.size*0.5,s.size*2);
    sCtx.fillRect(-s.size,-s.size*0.25,s.size*2,s.size*0.5);
  }
  sCtx.restore();
}

function startSparkle(wcx,wcy){
  var cam=getCam();
  var sx=(wcx-cam.cx)*TILE+TILE/2;
  var sy=(wcy-cam.cy)*TILE+TILE/2;
  var shapes=["heart","star","cross"];
  for(var i=0;i<30;i++){
    var angle=Math.random()*Math.PI*2;
    var speed=0.8+Math.random()*3;
    sparkles.push({x:sx,y:sy,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-1,
      life:1.0,decay:0.025+Math.random()*0.02,
      color:SCOLS[Math.floor(Math.random()*SCOLS.length)],
      shape:shapes[Math.floor(Math.random()*shapes.length)],
      size:2+Math.random()*3,rot:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.15});
  }
}

function updateSparkles(){
  sCtx.clearRect(0,0,sCanvas.width,sCanvas.height);
  if(!sparkles.length) return;
  var alive=[];
  for(var i=0;i<sparkles.length;i++){
    var s=sparkles[i];
    s.x+=s.vx;s.y+=s.vy;s.vy+=0.04;s.life-=s.decay;s.rot+=s.rotSpeed;
    if(s.life>0){drawSparkleParticle(s);alive.push(s);}
  }
  sparkles=alive;
}

function typeMsg(text,onDone){
  if(typeTimer){clearTimeout(typeTimer);typeTimer=null;}
  if(clearMsgTimer){clearTimeout(clearMsgTimer);clearMsgTimer=null;}
  msgTextEl.textContent="";msgCursorEl.style.display="inline-block";G.msgDone=false;
  var i=0;
  function step(){
    if(i<text.length){msgTextEl.textContent+=text[i++];typeTimer=setTimeout(step,28);}
    else{typeTimer=null;G.msgDone=true;if(onDone)onDone();}
  }
  step();
}

function clearMsg(){
  if(clearMsgTimer){clearTimeout(clearMsgTimer);clearMsgTimer=null;}
  clearMsgTimer=setTimeout(function(){
    if(typeTimer){clearTimeout(typeTimer);typeTimer=null;}
    msgTextEl.textContent="";msgCursorEl.style.display="none";G.msgDone=false;G.msgCb=null;
  },1000);
}

function clearMsgNow(){
  if(clearMsgTimer){clearTimeout(clearMsgTimer);clearMsgTimer=null;}
  if(typeTimer){clearTimeout(typeTimer);typeTimer=null;}
  msgTextEl.textContent="";msgCursorEl.style.display="none";G.msgDone=false;G.msgCb=null;
}

function showMsgs(arr,onAllDone){
  var idx=0;
  function next(){
    if(idx>=arr.length){msgCursorEl.style.display="none";if(onAllDone)onAllDone();return;}
    typeMsg(arr[idx++],function(){
      if(idx<arr.length){G.msgCb=next;}
      else{msgCursorEl.style.display="none";if(onAllDone)onAllDone();}
    });
  }
  next();
}

function updateMP(){

function changeMP(d){

}

function triggerNPC(npc){

  if(npc.type==="elevqueue_main"){

  // 謎の人物 — NPC IDごとに内容を完全固定（重複・ランダムなし）

      "mys_c2":{dmg:10, msg:"「こんな小さいうちから外に出て大丈夫なの？\nうちは半年は外出しなかったけど」\nそういう話、聞いてない。MPが10減った！"},

      "mys_c4":{hp:12,  msg:"「大変そうね、偉いね本当に」\nすれ違いざまに声をかけてくれた。\nMPが12回復した！"},
      "mys_c5":{hp:15,  msg:"「段差あるから、ベビーカー持ち上げますね！」\n若い人が走って来てくれた。\n温かくてMPが15回復した！"},

// ===================================================================
// PASSABLE
// ===================================================================
function passable(mx,my){
  var map=curMap();
  if(mx<0||mx>=map.w||my<0||my>=map.h) return false;
  var t=map.data[my][mx];
  return t!==T.WALL&&t!==T.STAIR&&t!==T.RAIL&&t!==T.TWALL;
}

// ===================================================================
// TRAIN EVENT
// ===================================================================
function clearTrain(){
  if(G.trainTimer){clearTimeout(G.trainTimer);G.trainTimer=null;}
}
function startTrain(){
  G.locked=true;G.trainUsed=true;
  var map=curMap();
  var msgs=map.trainMsgs;
  var phase=0;
  function tick(){
    if(phase>=msgs.length){
      showMsgs(["電車が海老反駅に到着した！\nドアが開く…！"],function(){
        clearTrain();
        setTimeout(function(){switchMap("B",MAP2.start.x,MAP2.start.y,MAP2.entry);},300);
      });return;
    }
    var m=msgs[phase];
    if(m.indexOf("MP")>=0) changeMP(-map.trainDmg);
    showMsgs([m],function(){phase++;if(G.mp>0)G.trainTimer=setTimeout(tick,2800);});
  }
  G.trainTimer=setTimeout(tick,400);
}

// ===================================================================
// ELEVATOR
// ===================================================================
function handleElev(){
  var map=curMap();
  var destKey=map.elevToMap;
  if(G.mapKey==="CONCOURSE"&&G.elevQueueDone<3){
    G.locked=true;
    showMsgs(["まだ人が並んでいる…\n先に並んでいる人たちを\n待たないといけない。"],
      function(){G.locked=false;clearMsg();});
    return;
  }
  // CONCOURSEのエレベーターに初めて乗るとき — 舌打ちした人と鉢合わせ
  if(G.mapKey==="CONCOURSE"&&destKey==="PLATFORM"&&!G.elevWaited){
    G.elevWaited=true;
    G.locked=true;
    showMsgs([
      "エレベーターのドアが開いた。\n…さっき舌打ちしてきた人が\nまだ中にいる。",
      "目が合った。ちょっと怖い…\nここは一回見送って\n次に乗ろう。",
      "次のエレベーターを待った。\nドアが開く…乗り込もう！"
    ], function(){
      var dest=MAPS[destKey];
      switchMap(destKey,dest.start.x,dest.start.y,
        "エレベーターでホームに降りた！\n海老反駅行きの電車に乗ろう。");
    });
    return;
  }
  if(!destKey){
    G.locked=true;
    showMsgs(["エレベーターだが…\nここでは使えないようだ。"],function(){G.locked=false;clearMsg();});
    return;
  }
  G.locked=true;
  showMsgs(["エレベーターに乗った…"],function(){
    var msg=destKey==="PLATFORM"
      ?"エレベーターでホームに降りた！\n海老反駅行きの電車に乗ろう。"
      :"エレベーターでコンコースに戻った。";
    // CONCOURSEに戻るときはエレベーター出口位置(x=12,y=10)へ
    var spx, spy;
    if(destKey==="CONCOURSE"){
      spx=12; spy=10;
    } else {
      var dest=MAPS[destKey];
      spx=dest.start.x; spy=dest.start.y;
    }
    switchMap(destKey,spx,spy,msg);
  });
}

// ===================================================================
// 突進イベント (MAP2 y=8 横一列、一回のみ)
// ===================================================================
var rushAnim=null; // {x, targetX, done}

function startRushEvent(){
  G.locked=true;
  var map=curMap();
  var cam=getCam();
  // 突進キャラをキャンバス右端外から開始
  var startCanvasX = VCOLS*TILE + TILE;
  rushAnim = {x: startCanvasX, speed: 14};

  function animStep(){
    rushAnim.x -= rushAnim.speed;
    render();
    // 突進キャラをcanvas上に描画
    var cam2=getCam();
    var targetWorldX = G.px; // プレイヤーのX列
    var targetCanvasX = (targetWorldX - cam2.cx)*TILE;
    var rushCanvasY = (G.py - cam2.cy)*TILE;
    // 突進する人を描画（右から左へ走る赤い人）
    drawRushMan(rushAnim.x, rushCanvasY);

    if(rushAnim.x > targetCanvasX + TILE){
      requestAnimationFrame(animStep);
    } else {
      // ヒット！フラッシュ＆メッセージ
      rushAnim=null;
      flash("#f44");
      showMsgs([
        "右側から人が突進してきた！",
        "ベビーカーごと激しくぶつかられ\n倒れそうになった…！",
        "あやまりもせず走り去っていった。\nMPが25減った！"
      ], function(){
        changeMP(-25);
        G.locked=false;
        clearMsg();
      });
    }
  }
  requestAnimationFrame(animStep);
}

function drawRushMan(sx,sy){
  var S=TILE;
  // 走っている人（濃い色・前傾姿勢）
  ctx.save();
  // 体
  ctx.fillStyle="#8B0000";
  ctx.fillRect(sx+4,sy+10,S-8,9);
  // 頭
  ctx.fillStyle="#f0c880";
  ctx.beginPath();ctx.arc(sx+S/2-2,sy+7,6,0,Math.PI*2);ctx.fill();
  // 腕（前に伸ばしている）
  ctx.fillStyle="#8B0000";
  ctx.fillRect(sx-4,sy+9,10,3);
  // 脚（走り）
  ctx.fillStyle="#333";
  ctx.fillRect(sx+4,sy+19,4,5);
  ctx.fillRect(sx+10,sy+17,4,5);
  // 怒りマーク
  ctx.fillStyle="#ff4400";
  ctx.font="bold 9px monospace";ctx.textAlign="center";
  ctx.fillText("！",sx+S/2+4,sy+3);
  ctx.restore();
}

function checkRushTrigger(ny){
  // MAP2 (海老反駅) のy=8に入ったとき一回だけ
  if(G.mapKey==="B" && ny===8 && !G.rushDone){
    G.rushDone=true;
    setTimeout(startRushEvent, 200);
  }
}
function tryMove(dx,dy){
  if(G.phase!=="playing") return;
  if(G.locked) return;
  if(G.msgCb){var cb=G.msgCb;G.msgCb=null;G.msgDone=false;cb();return;}
  if(G.msgDone){clearMsgNow();return;}
  if(dx===0&&dy===0) return;

  G.facing=dx<0?3:dx>0?1:dy<0?0:2;
  var nx=G.px+dx,ny=G.py+dy;
  var map=curMap();

  if(!passable(nx,ny)){
    if(map.data[ny]&&map.data[ny][nx]===T.STAIR){
      showMsgs(["階段はベビーカーでは通れない！\nエレベーター(E)を探そう。"],function(){clearMsg();});
    }
    render();return;
  }

  // 改札
  if(map.data[ny]&&map.data[ny][nx]===T.GATE){
    G.px=nx;G.py=ny;handleGatePass();render();return;
  }

  // NPC衝突チェック (elevqueueは正面接触のみ、tryMoveでも衝突扱い)
  var npc=null;
  var npcs=map.npcs||[];
  for(var i=0;i<npcs.length;i++){
    if(!G.dead[npcs[i].id]&&npcs[i].x===nx&&npcs[i].y===ny){npc=npcs[i];break;}
  }
  if(npc){
    triggerNPC(npc);render();return;
  }

  G.px=nx;G.py=ny;
  var tid=map.data[ny][nx];

  if(tid===T.ELEV||tid===T.ELEVDOOR){handleElev();render();return;}

  if(tid===T.TRAINDOOR&&!map.isTrain){
    if(G.trainUsed){
      showMsgs(["もう電車は降りた。\n乗り直すことはできない。"],function(){clearMsg();});
      render();return;
    }
    G.locked=true;
    showMsgs(["電車に乗り込んだ。\n満員だ…息が詰まりそう。"],function(){
      switchMap("TRAIN",MAP1.start.x,MAP1.start.y,null);
      startTrain();
    });
    render();return;
  }

  checkRushTrigger(ny);
  render();
}

function talkFacing(){
  if(G.phase!=="playing") return;
  if(G.msgCb){var cb=G.msgCb;G.msgCb=null;G.msgDone=false;cb();return;}
  if(G.msgDone){clearMsgNow();return;}
  if(G.locked) return;
  var ddx=[0,1,0,-1][G.facing];
  var ddy=[-1,0,1,0][G.facing];
  var tx2=G.px+ddx,ty2=G.py+ddy;
  var map=curMap();
  var npcs=map.npcs||[];
  for(var i=0;i<npcs.length;i++){
    if(!G.dead[npcs[i].id]&&npcs[i].x===tx2&&npcs[i].y===ty2){
      triggerNPC(npcs[i]);return;
    }
  }
}

      window.open("https://www.instagram.com/","_blank");
      setTimeout(function(){
        alert("Instagramが開きました！\nストーリーズやフィードにゲームのスクリーンショットと\n「#育児ダンジョン」をつけてポストしてね！");

  } else {

    overlayEl.appendChild(h1);overlayEl.appendChild(p);overlayEl.appendChild(b1);overlayEl.appendChild(ln);
  }
}

// ===================================================================
// START
// ===================================================================
function startGame(){
  clearTrain();clearElevWait();clearMsgNow();
  G.phase="playing";G.mapKey="CONCOURSE";
  G.px=MAP0.start.x;G.py=MAP0.start.y;
  G.mp=100;G.maxMp=100;G.facing=2;
  G.locked=false;G.msgDone=false;G.msgCb=null;
  G.dead={};G.trainTimer=null;G.gateUsed=false;
  G.trainUsed=false;G.elevQueueDone=0;G.elevWaitTimer=null;G.rushDone=false;G.elevWaited=false;
  // 待機列NPCの座標をリセット（ゲーム中にy座標が書き換えられるため）
  var npcs0=MAP0.npcs;
  for(var i=0;i<npcs0.length;i++){
    if(npcs0[i].id==="eqA") npcs0[i].y=10;
    if(npcs0[i].id==="eqB") npcs0[i].y=11;
    if(npcs0[i].id==="eqC") npcs0[i].y=12;
  }
  sparkles=[];updateMP();render();
  G.locked=true;
  showMsgs([MAP0.entry],function(){G.locked=false;clearMsg();});
}

// ===================================================================
// INPUT
// ===================================================================
document.getElementById("btn-up").addEventListener("click",    function(){tryMove(0,-1);});
document.getElementById("btn-down").addEventListener("click",  function(){tryMove(0,1);});
document.getElementById("btn-left").addEventListener("click",  function(){tryMove(-1,0);});
document.getElementById("btn-right").addEventListener("click", function(){tryMove(1,0);});
document.getElementById("btn-a").addEventListener("click",     function(){talkFacing();});

["btn-up","btn-down","btn-left","btn-right","btn-a"].forEach(function(id){
  var el=document.getElementById(id);
  el.addEventListener("touchstart",function(e){e.preventDefault();el.click();},{passive:false});
});

document.addEventListener("keydown",function(e){
  if(e.key==="ArrowUp"||e.key==="w")      {e.preventDefault();tryMove(0,-1);}
  else if(e.key==="ArrowDown"||e.key==="s") {e.preventDefault();tryMove(0,1);}
  else if(e.key==="ArrowLeft"||e.key==="a") {e.preventDefault();tryMove(-1,0);}
  else if(e.key==="ArrowRight"||e.key==="d"){e.preventDefault();tryMove(1,0);}
  else if(e.key==="Enter"||e.key===" "||e.key==="z"){e.preventDefault();talkFacing();}
});

document.getElementById("ov-start").addEventListener("click",function(){
  overlayEl.style.display="none";startGame();
});

// ===================================================================
// LOOP
// ===================================================================
function loop(){
  if(G.phase==="playing"){render();updateSparkles();}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
render();

})();
</script>
